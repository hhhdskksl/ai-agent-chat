services:
  - type: web
    name: ai-agent-chat
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/chats
    envVars:
      - key: POLZA_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.18.0
